<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇智波佐助：疾风跑酷</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border: 4px solid #4a4a4a;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
        }
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #scoreBoard {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            text-shadow: 2px 2px 0px #fff;
        }
        #startScreen, #gameOverScreen {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            pointer-events: auto;
        }
        h1 { 
            margin: 0 0 10px 0; 
            color: #ff4d4d; 
            text-shadow: 2px 2px #000; 
        }
        p { 
            font-size: 18px; 
            margin-bottom: 20px; 
        }
        button {
            padding: 10px 25px;
            font-size: 18px;
            background-color: #6a0dad;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { 
            background-color: #8a2be2; 
        }
        .hidden { 
            display: none !important; 
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div id="uiLayer">
        <div id="scoreBoard">分数: 0</div>
        
        <div id="startScreen">
            <h1>宇智波佐助：疾风跑酷</h1>
            <p>按 [空格] 或 [点击屏幕] 跳跃<br>支持二段跳！按 [下] 滑铲</p>
            <button onclick="startGame()">开始修行</button>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h1>任务失败</h1>
            <p>最终分数: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">再次挑战</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('scoreBoard');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreElement = document.getElementById('finalScore');

    // 游戏变量
    let gameRunning = false;
    let score = 0;
    let gameSpeed = 5;
    let frame = 0;
    let obstacles = [];
    let particles = [];

    // 佐助对象
    const sasuke = {
        x: 50,
        y: 300,
        width: 40,
        height: 60,
        dy: 0,
        jumpPower: -12,
        gravity: 0.6,
        grounded: false,
        jumpCount: 0,
        maxJumps: 2, // 二段跳

        draw: function() {
            // 1. 绘制头顶的 "sasuke" 字符串 (已修复：放回佐助这里)
            ctx.fillStyle = '#6a0dad'; // 使用佐助的紫色
            ctx.font = 'bold 16px Arial'; // 设置字体大小和粗细
            ctx.textAlign = 'center'; // 让文字水平居中对齐
            // 在头部上方 (this.y - 10) 绘制文字
            ctx.fillText('sasuke', this.x + this.width / 2, this.y - 10);

            // 2. 身体
            ctx.fillStyle = '#1a1a1a'; // 深色衣服
            ctx.fillRect(this.x, this.y + 20, this.width, this.height - 20);
            
            // 3. 头
            ctx.fillStyle = '#ffdbac'; // 肤色
            ctx.fillRect(this.x + 5, this.y, 30, 25);
            
            // 4. 头发 (刺猬头)
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.moveTo(this.x, this.y + 5);
            ctx.lineTo(this.x + 5, this.y - 5);
            ctx.lineTo(this.x + 15, this.y);
            ctx.lineTo(this.x + 25, this.y - 8);
            ctx.lineTo(this.x + 40, this.y + 5);
            ctx.lineTo(this.x + 40, this.y + 15);
            ctx.lineTo(this.x, this.y + 15);
            ctx.fill();

            // 5. 宇智波团扇族徽 (背部)
            ctx.fillStyle = '#ff4d4d'; // 红
            ctx.beginPath();
            ctx.arc(this.x + 20, this.y + 35, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff'; // 白
            ctx.fillRect(this.x + 18, this.y + 27, 4, 16);
            ctx.fillRect(this.x + 12, this.y + 33, 16, 4);

            // 6. 护额
            ctx.fillStyle = '#555';
            ctx.fillRect(this.x + 5, this.y + 5, 30, 8);
            ctx.fillStyle = '#ccc'; // 金属片
            ctx.fillRect(this.x + 10, this.y + 6, 20, 6);
        },

        update: function() {
            // 跳跃物理
            this.y += this.dy;
            
            if (this.y + this.height < canvas.height - 50) {
                this.dy += this.gravity;
                this.grounded = false;
            } else {
                this.dy = 0;
                this.grounded = true;
                this.y = canvas.height - 50 - this.height;
                this.jumpCount = 0; // 落地重置跳跃次数
            }
        },

        jump: function() {
            if (this.jumpCount < this.maxJumps) {
                this.dy = this.jumpPower;
                this.jumpCount++;
                createParticles(this.x + this.width/2, this.y + this.height, 5);
            }
        }
    };

    // 障碍物类 (已修复：移除了里面的文字绘制代码)
    class Obstacle {
        constructor() {
            this.width = 30 + Math.random() * 20;
            this.height = 30 + Math.random() * 30;
            this.x = canvas.width;
            this.y = canvas.height - 50 - this.height;
            this.markedForDeletion = false;
            // 随机决定是地面障碍还是飞行道具(苦无)
            this.type = Math.random() > 0.7 ? 'kunai' : 'rock';
            
            if (this.type === 'kunai') {
                this.y -= 40; // 飞在空中
                this.width = 30;
                this.height = 10;
            }
        }

        update() {
            this.x -= gameSpeed;
            if (this.x + this.width < 0) this.markedForDeletion = true;
        }

        draw() {
            // 只保留障碍物本身的绘制
            if (this.type === 'rock') {
                ctx.fillStyle = '#555';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // 简单的石头纹理
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x + 5, this.y + 5, this.width - 10, this.height - 10);
            } else {
                // 苦无
                ctx.fillStyle = '#888';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width, this.y + this.height / 2);
                ctx.lineTo(this.x, this.y + this.height);
                ctx.fill();
                // 苦无把手
                ctx.fillStyle = '#3e2723';
                ctx.fillRect(this.x - 10, this.y + 2, 10, this.height - 4);
            }
        }
    }

    // 粒子效果 (查克拉/尘土)
    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 5 + 2;
            this.speedX = Math.random() * 2 - 1;
            this.speedY = Math.random() * 2 - 1;
            this.color = Math.random() > 0.5 ? '#8a2be2' : '#fff'; // 紫色查克拉或白色尘土
            this.life = 1.0;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= 0.05;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    function createParticles(x, y, count) {
        for(let i=0; i<count; i++) {
            particles.push(new Particle(x, y));
        }
    }

    // 输入控制
    window.addEventListener('keydown', function(e) {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            if (gameRunning) sasuke.jump();
        }
        if (e.code === 'ArrowDown' && gameRunning) {
            // 快速下落
            if (!sasuke.grounded) sasuke.dy += 5;
        }
    });

    canvas.addEventListener('touchstart', function(e) {
        if (gameRunning) {
            e.preventDefault();
            sasuke.jump();
        }
    });
    
    canvas.addEventListener('mousedown', function(e) {
        if (gameRunning) sasuke.jump();
    });

    // 游戏主循环
    function animate() {
        if (!gameRunning) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frame++;

        // 绘制地面
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
        ctx.fillStyle = '#388e3c';
        ctx.fillRect(0, canvas.height - 50, canvas.width, 10);

        // 生成障碍物
        let spawnRate = Math.max(60, 120 - Math.floor(score / 50)); 
        if (frame % spawnRate === 0) {
            obstacles.push(new Obstacle());
        }

        // 更新和绘制障碍物
        obstacles.forEach((obs, index) => {
            obs.update();
            obs.draw();
            
            // 碰撞检测
            if (
                sasuke.x < obs.x + obs.width &&
                sasuke.x + sasuke.width > obs.x &&
                sasuke.y < obs.y + obs.height &&
                sasuke.y + sasuke.height > obs.y
            ) {
                gameOver();
            }

            if (obs.markedForDeletion) obstacles.splice(index, 1);
        });

        // 更新和绘制佐助
        sasuke.update();
        sasuke.draw();

        // 粒子效果
        particles.forEach((p, index) => {
            p.update();
            p.draw();
            if (p.life <= 0) particles.splice(index, 1);
        });

        // 更新分数和速度
        if (frame % 10 === 0) {
            score++;
            scoreElement.innerText = "分数: " + score;
            // 每100分增加速度
            if (score % 100 === 0) {
                gameSpeed += 0.5;
            }
        }

        requestAnimationFrame(animate);
    }

    function startGame() {
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        resetVariables();
        gameRunning = true;
        animate();
    }

    function resetGame() {
        startGame();
    }

    function resetVariables() {
        score = 0;
        gameSpeed = 5;
        frame = 0;
        obstacles = [];
        particles = [];
        sasuke.y = 300;
        sasuke.dy = 0;
        scoreElement.innerText = "分数: 0";
    }

    function gameOver() {
        gameRunning = false;
        finalScoreElement.innerText = score;
        gameOverScreen.classList.remove('hidden');
    }

    // 初始绘制背景
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
</script>

</body>
</html>
